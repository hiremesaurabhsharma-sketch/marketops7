<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>E-Commerce Data Flow Animation</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #080c14;
      overflow: hidden;
      font-family: sans-serif;
    }
    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    .overlay-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      text-align: center;
      pointer-events: none;
    }
    .overlay-text h1 {
      font-size: 3rem;
      margin: 0 0 1rem 0;
      background: linear-gradient(90deg, #ff9900, #2874f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .overlay-text p {
      font-size: 1.2rem;
      color: rgba(255,255,255,0.7);
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="overlay-text">
    <h1>E-Commerce Data Loop Demo</h1>
    <p>We can use this animated canvas as a looping background video!</p>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let w, h, particles;
    const particleCount = 100;
    // Amazon Orange and Flipkart Blue
    const colors = ['#ff9900', '#2874f0', '#00e5ff'];

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }

    class Particle {
      constructor() {
        this.x = Math.random() * w;
        this.y = Math.random() * h;
        this.vx = (Math.random() - 0.5) * 1;
        this.vy = (Math.random() - 0.5) * 1 - 0.5; // Drift upwards
        this.size = Math.random() * 2 + 1;
        this.color = colors[Math.floor(Math.random() * colors.length)];
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        
        if (this.x < 0 || this.x > w) this.vx *= -1;
        if (this.y < 0) this.y = h;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;
      }
    }

    function init() {
      resize();
      particles = [];
      for(let i=0; i<particleCount; i++) {
        particles.push(new Particle());
      }
    }

    function animate() {
      ctx.fillStyle = 'rgba(8, 12, 20, 0.2)'; // Trailing effect
      ctx.fillRect(0, 0, w, h);
      
      particles.forEach(p => {
        p.update();
        p.draw();
      });
      
      // Draw connecting lines
      for(let i=0; i<particles.length; i++) {
        for(let j=i; j<particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          
          if(dist < 120) {
            ctx.beginPath();
            ctx.strokeStyle = `rgba(255, 255, 255, ${0.1 - dist/1200})`;
            ctx.lineWidth = 0.5;
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
      }
      
      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', resize);
    init();
    animate();
  </script>
</body>
</html>
